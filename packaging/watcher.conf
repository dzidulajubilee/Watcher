# Watcher IDS Dashboard — Configuration
# Edit then restart: systemctl restart watcher
#
# Uncomment ONE WATCHER_ARGS line with all your options, e.g.:
#WATCHER_ARGS=--eve /var/log/suricata/eve.json --port 8765 --retain-days 90

# ── AI-powered alert explanations (optional) ────────────────────────────────
# Choose one provider and set its key.  You can also manage keys in the
# Settings → AI Explain panel (UI keys take priority over these env vars).
#
# Provider options: deepseek | openai | anthropic | nvidia
#AI_PROVIDER=deepseek
#
# DeepSeek  →  https://platform.deepseek.com/api_keys
#DEEPSEEK_API_KEY=sk-...
#
# OpenAI    →  https://platform.openai.com/api-keys
#OPENAI_API_KEY=sk-...
#
# Anthropic →  https://console.anthropic.com/settings/keys
#ANTHROPIC_API_KEY=sk-ant-...
#
# NVIDIA NIM  →  https://build.nvidia.com (click any model → Get API Key)
#NVIDIA_API_KEY=nvapi-...
