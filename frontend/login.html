<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Watcher — Sign in</title>
<style>
/* Self-hosted fonts — no Google Fonts (airgapped) */
@font-face {
  font-family: 'IBM Plex Mono';
  font-style: normal;
  font-weight: 400;
  font-display: swap;
  src: url('/frontend/fonts/ibm-plex-mono-latin-400-normal.woff2') format('woff2');
}
@font-face {
  font-family: 'IBM Plex Mono';
  font-style: normal;
  font-weight: 500;
  font-display: swap;
  src: url('/frontend/fonts/ibm-plex-mono-latin-500-normal.woff2') format('woff2');
}
@font-face {
  font-family: 'IBM Plex Sans';
  font-style: normal;
  font-weight: 400;
  font-display: swap;
  src: url('/frontend/fonts/ibm-plex-sans-latin-400-normal.woff2') format('woff2');
}
@font-face {
  font-family: 'IBM Plex Sans';
  font-style: normal;
  font-weight: 500;
  font-display: swap;
  src: url('/frontend/fonts/ibm-plex-sans-latin-500-normal.woff2') format('woff2');
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'IBM Plex Sans', system-ui, sans-serif;
  background: #0a0c10;
  color: #e8eaf0;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

.wrap  { width: 360px; max-width: 92vw; }

/* ── Logo ── */
.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 36px;
}
.logo-box {
  width: 34px; height: 34px;
  background: #4f9cf9;
  border-radius: 7px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.logo-box svg { width: 18px; height: 18px; }
.logo-name {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 15px;
  font-weight: 500;
  letter-spacing: .06em;
}
.logo-tag {
  font-size: 10px;
  color: #4a5163;
  font-family: 'IBM Plex Mono', monospace;
  letter-spacing: .05em;
  margin-left: auto;
  white-space: nowrap;
}

/* ── Card ── */
.card {
  background: #0f1117;
  border: 1px solid rgba(255,255,255,0.09);
  border-radius: 12px;
  padding: 32px;
}
.card-title { font-size: 17px; font-weight: 500; margin-bottom: 4px; }
.card-sub   { font-size: 12px; color: #7b8394; margin-bottom: 24px; }

/* ── Form ── */
label {
  display: block;
  font-size: 10px;
  font-weight: 500;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: #4a5163;
  margin-bottom: 6px;
}
.input-wrap { position: relative; margin-bottom: 20px; }

input[type=password],
input[type=text] {
  width: 100%;
  padding: 10px 40px 10px 12px;
  background: #161b24;
  border: 1px solid rgba(255,255,255,0.09);
  border-radius: 6px;
  color: #e8eaf0;
  font-size: 13px;
  font-family: 'IBM Plex Sans', sans-serif;
  outline: none;
  transition: border-color .2s;
}
input:focus { border-color: rgba(79,156,249,.45); }

.eye {
  position: absolute;
  right: 11px;
  top: 50%;
  transform: translateY(-50%);
  cursor: pointer;
  color: #4a5163;
  background: none;
  border: none;
  padding: 2px;
  display: flex;
  align-items: center;
  transition: color .15s;
}
.eye:hover { color: #7b8394; }

/* ── Button ── */
.btn-submit {
  width: 100%;
  padding: 10px;
  border-radius: 6px;
  border: none;
  background: #4f9cf9;
  color: #fff;
  font-size: 13px;
  font-family: 'IBM Plex Sans', sans-serif;
  font-weight: 500;
  cursor: pointer;
  transition: background .15s;
  letter-spacing: .02em;
}
.btn-submit:hover:not(:disabled) { background: #3d8de8; }
.btn-submit:disabled { background: #1a2030; color: #4a5163; cursor: not-allowed; }

/* ── Error ── */
.error {
  margin-top: 14px;
  font-size: 12px;
  color: #f05454;
  text-align: center;
  background: rgba(240,84,84,.1);
  padding: 8px 12px;
  border-radius: 5px;
  border: 1px solid rgba(240,84,84,.2);
  display: none;
}
</style>
</head>
<body>
<div class="wrap">

  <div class="logo">
    <div class="logo-box">
      <!-- Watcher watchman eye -->
      <svg viewBox="0 0 24 24" fill="none">
        <ellipse cx="12" cy="12" rx="10" ry="7"
                 stroke="white" stroke-width="1.8" stroke-opacity=".9"/>
        <circle  cx="12" cy="12" r="3"   fill="white" fill-opacity=".9"/>
        <circle  cx="12" cy="12" r="1.2" fill="white" fill-opacity=".4"/>
      </svg>
    </div>
    <span class="logo-name">WATCHER</span>
    <span class="logo-tag">IDS DASHBOARD</span>
  </div>

  <div class="card">
    <div class="card-title">Sign in</div>
    <div class="card-sub">Enter your password to access the dashboard</div>

    <label for="un">Username</label>
    <div class="input-wrap" style="margin-bottom:16px">
      <input type="text" id="un" placeholder="username" autocomplete="username" autofocus>
    </div>

    <label for="pw">Password</label>
    <div class="input-wrap">
      <input type="password" id="pw" placeholder="••••••••••••" autocomplete="current-password">
      <button class="eye" id="eye-btn" type="button" title="Show / hide password">
        <svg width="16" height="16" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
          <circle cx="12" cy="12" r="3"/>
        </svg>
      </button>
    </div>

    <button class="btn-submit" id="submit-btn" type="button">Sign in</button>
    <div class="error" id="error-msg"></div>
  </div>


  <div style="margin-top:28px; text-align:center; font-size:11px; color:#4a5163; font-family:'IBM Plex Mono',monospace; letter-spacing:.04em;">
    Made with ❤️ by Gati
  </div>
</div>
<script src="/frontend/login.js"></script>
</body>
</html>
